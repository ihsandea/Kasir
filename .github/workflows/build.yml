name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Build with Buildozer
      uses: digreat/bbn-buildozer-action@v2
      with:
        python-version: 3.10
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Kasir-Ihsan-APK
        path: bin/*.apk
